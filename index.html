<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recherche Pokémon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="main-title" class="dynamic-title">Recherche Pokémon</h1>
    <div class="lang-switch">
        <button id="lang-fr" class="lang-btn">FR</button>
        <button id="lang-en" class="lang-btn">EN</button>
    </div>
    <div id="tabs-section" class="tabs-container" style="display:none;">
        <button id="tab-search" class="tab-btn active"><span id="search-btn-text">Recherche</span></button>
        <button id="tab-import" class="tab-btn"><span id="import-btn-text">Import Sprite</span></button>
    </div>
    <div class="search-box" id="search-section">
        <input type="text" id="search" placeholder="Numéro du Pokémon..." autocomplete="off" />
        <button id="valider-btn">Valider</button>
        <div id="suggestions" class="suggestions"></div>
    </div>
    <div id="import-section" class="import-section">
        <h2 id="import-sprite-title" style="color: #b388ff; text-align: center; margin-top: 0;">Import Sprite</h2>
        <div class="upload-area" id="upload-area">
            <div class="upload-hint" id="drag-drop-hint">Glissez-déposez une image PNG ici</div>
            <input type="file" id="file-input" accept=".png,image/png" />
            <button class="action-btn" id="upload-btn" style="margin-top: 1em;">Sélectionner une image</button>
        </div>
        <img id="uploaded-image" style="display:none; max-width: 0%; border-radius: 8px; margin-bottom: 2em;" />
        <div id="palette-section" style="display:none;">
            <h3 id="select-palettes-title" style="color: #b388ff; margin-top: 0;">Sélectionner les palettes</h3>
            
            <!-- APERÇUS Original vs Shiny EN HAUT -->
            <div class="preview-container" style="margin-bottom: 2em;">
                <div class="preview-item">
                    <h4 id="original-label">Original</h4>
                    <img id="original-preview" style="max-height: 250px;" />
                </div>
                <div class="preview-item">
                    <h4 id="preview-title">Aperçu avec palette(s)</h4>
                    <img id="palette-preview" style="max-height: 250px;" />
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2em; margin-bottom: 2em;">
                <!-- PALETTE TÊTE -->
                <div style="background: #2a0845cc; border-radius: 12px; padding: 1.5em; border: 1px solid #7c4dff;">
                    <h4 id="head-palette-title" style="color: #b388ff; margin-top: 0; text-align: center;">👤 Palette Tête</h4>
                    <input type="text" id="palette-search-head" class="palette-search-input" placeholder="Rechercher..." style="width: 90%; margin-bottom: 1em;" />
                    <div id="palette-list-head" class="palette-list" style="max-height: 250px;"></div>
                    <div id="palette-display-head" class="palette-display" style="margin-top: 1em;">—</div>
                </div>
                
                <!-- PALETTE CORPS -->
                <div style="background: #2a0845cc; border-radius: 12px; padding: 1.5em; border: 1px solid #7c4dff;">
                    <h4 id="body-palette-title" style="color: #b388ff; margin-top: 0; text-align: center;">🦴 Palette Corps</h4>
                    <input type="text" id="palette-search-body" class="palette-search-input" placeholder="Rechercher..." style="width: 90%; margin-bottom: 1em;" />
                    <div id="palette-list-body" class="palette-list" style="max-height: 250px;"></div>
                    <div id="palette-display-body" class="palette-display" style="margin-top: 1em;">—</div>
                </div>
            </div>
            
            <div class="palette-buttons" style="justify-content: center;">
                <button class="action-btn" id="reset-palettes-btn" style="padding: 12px 30px; font-size: 1.1em; background: #6441a5;">🔄 Réinitialiser</button>
            </div>
            
            <div style="text-align: center; margin-top: 2em;">
                <button class="action-btn" id="download-btn" style="padding: 12px 30px; font-size: 1.1em;">⬇️ Télécharger l'image</button>
            </div>
        </div>
    </div>
    <div id="pokemon-detail" style="display:none; max-width:800px; margin:auto; background:#fff; padding:2em; border-radius:10px; box-shadow:0 2px 8px #0001;"></div>
    <footer class="footer-credits">
        <div id="footer-credit"></div>
    </footer>
    <script type="module" src="static/main.js"></script>
</body>
</html>
