<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recherche Pokémon</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 2em;
            background: linear-gradient(135deg, #2a0845 0%, #6441a5 100%);
            min-height: 100vh;
            color: #f3eaff;
        }
        .dynamic-title {
            font-size: 2.8em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 0.2em;
            letter-spacing: 2px;
            color: #b388ff;
            text-shadow: 0 2px 16px #0008, 0 1px 0 #fff2;
            animation: titlePulse 2s infinite alternate;
        }
        @keyframes titlePulse {
            from { color: #b388ff; text-shadow: 0 2px 16px #0008, 0 1px 0 #fff2; }
            to { color: #fff; text-shadow: 0 4px 32px #7c4dff, 0 1px 0 #fff2; }
        }
        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 1em;
            margin-bottom: 2em;
        }
        .lang-btn {
            background: #7c4dff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px #0003;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .lang-btn:hover, .lang-btn.active {
            background: #b388ff;
            color: #2a0845;
            transform: scale(1.08);
        }
        /* --- SEARCH BOX UNIQUE DEFINITION --- */
        .search-box {
            background: #2a0845cc;
            border-radius: 18px;
            box-shadow: 0 8px 32px #0007, 0 1.5px 0 #fff1;
            padding: 2.2em 1.2em 1.7em 1.2em;
            margin: 2em auto 2em auto;
            max-width: 400px;
            width: 400px;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            /* align-items: center;
            justify-content: center; */
            transition: box-shadow 0.2s;
        }
        .search-box input[type="text"], .search-box #suggestions {
            width: 90%;
            max-width: 360px;
            min-width: 160px;
        }
        .search-box input[type="text"] {
            background: #3d246c;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.15em;
            padding: 0.9em 1.2em;
            margin-bottom: 1.2em;
            box-shadow: 0 1px 8px #7c4dff33;
            outline: none;
            transition: box-shadow 0.2s, border 0.2s;
        }
        .search-box input[type="text"]:focus {
            box-shadow: 0 2px 16px #b388ff55;
            border: 1.5px solid #b388ff;
        }
        .search-box button {
            width: 100%;
            max-width: 220px;
            padding: 0.85em 0;
            font-size: 1.13em;
            border-radius: 8px;
            background: linear-gradient(90deg,#7c4dff 60%,#1976d2 100%);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 2px 12px #7c4dff44;
            margin-bottom: 1.1em;
            transition: background 0.2s, transform 0.2s;
        }
        .search-box button:hover {
            background: linear-gradient(90deg,#b388ff 60%,#1976d2 100%);
            color: #2a0845;
            transform: scale(1.04);
        }
        .search-box #suggestions {
            margin-top: 0.2em;
        }
        @media (max-width: 480px) {
            .search-box {
                width: 98vw;
                max-width: 99vw;
                min-width: unset;
                padding: 1.2em 0.2em 1.2em 0.2em;
            }
            .search-box input[type="text"], .search-box #suggestions {
                width: 94vw;
                max-width: 98vw;
                min-width: unset;
            }
        }
        .suggestions {
            background: #2a0845;
            color: #fff;
            border: 1px solid #7c4dff;
        }
        .suggestion {
            border-bottom: 1px solid #6441a5;
        }
        .suggestion:hover {
            background: #7c4dff;
            color: #2a0845;
        }
        .card {
            background: #3d246c;
            color: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px #0005;
            position: relative; /* Ajouté pour positionner les flèches */
        }
        /* Flèches variantes sur les côtés */
        .var-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            font-size: 2em;
            padding: 0.2em 0.7em;
            border-radius: 50%;
            border: none;
            background: #b388ff;
            color: #2a0845;
            cursor: pointer;
            box-shadow: 0 2px 8px #7c4dff33;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .var-arrow:hover {
            background: #fff;
            color: #7c4dff;
            transform: translateY(-50%) scale(1.08);
        }
        .var-arrow.left {
            left: -70px;
        }
        .var-arrow.right {
            right: -70px;
        }
        @media (max-width: 600px) {
            .var-arrow.left { left: -10px; }
            .var-arrow.right { right: -10px; }
        }
        .poke-title {
            color: #b388ff;
        }
        .section-title {
            color: #fff;
            border-left: 4px solid #b388ff;
        }
        .video-block {
            background: #2a0845;
            color: #fff;
            box-shadow: 0 2px 8px #7c4dff33;
        }
        .dl-btn {
            background: #b388ff;
            color: #2a0845;
        }
        .dl-btn:hover {
            background: #fff;
            color: #7c4dff;
        }
        .palette-box {
            background: #6441a5;
            color: #fff;
            border-radius: 10px;
            padding: 1em;
            max-width: 100%;
            overflow-x: auto;
            display: flex;
            align-items: flex-start;
            gap: 1em;
            margin-bottom: 1em;
        }
        .palette-pre {
            background: transparent;
            color: #fff;
            font-size: 1em;
            margin: 0;
            padding: 0;
            border: none;
            white-space: pre;
            max-width: 70vw;
            min-width: 0;
            overflow-x: auto;
            word-break: break-all;
        }
        .copy-btn {
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            .palette-pre { max-width: 50vw; font-size: 0.95em; }
            .palette-box { flex-direction: column; gap: 0.5em; }
        }
        .like-btn {
            background: #fff;
            color: #7c4dff;
        }
        .like-btn:hover {
            background: #b388ff;
            color: #2a0845;
        }
        .back-link {
            color: #b388ff;
        }
        .back-link:hover {
            color: #fff;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: none; }
        }
        .footer-credits {
            text-align: center;
            color: #b388ff;
            font-size: 1em;
            margin-top: 3em;
            margin-bottom: 1em;
            opacity: 0.8;
        }
        .preview-modal-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(30,20,60,0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-modal {
            background: #2a0845;
            border-radius: 18px;
            box-shadow: 0 8px 32px #000a;
            padding: 2em 2em 1.5em 2em;
            max-width: 95vw;
            max-height: 90vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .preview-images {
            display: flex;
            gap: 2em;
            align-items: flex-end;
            margin-bottom: 1em;
        }
        .preview-images img {
            max-width: 220px;
            max-height: 220px;
            border-radius: 12px;
            box-shadow: 0 2px 12px #7c4dff44;
            background: #fff;
        }
        .preview-close {
            position: absolute;
            top: 10px; right: 18px;
            background: #b388ff;
            color: #2a0845;
            border: none;
            border-radius: 50%;
            width: 36px; height: 36px;
            font-size: 1.5em;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 8px #7c4dff33;
        }
        .preview-close:hover {
            background: #fff;
            color: #7c4dff;
        }
        /* --- IMPORT SPRITE STYLES --- */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 1em;
            margin-bottom: 2em;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #7c4dff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px #0003;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .tab-btn:hover, .tab-btn.active {
            background: #b388ff;
            color: #2a0845;
            transform: scale(1.08);
        }
        .import-section {
            display: none;
            max-width: 900px;
            margin: 2em auto;
            background: #3d246c;
            border-radius: 16px;
            padding: 2em;
            box-shadow: 0 4px 24px #0005;
            border: 1px solid #7c4dff;
        }
        .import-section.active {
            display: block;
        }
        .upload-area {
            border: 2px dashed #b388ff;
            border-radius: 12px;
            padding: 2em;
            text-align: center;
            background: #2a0845cc;
            cursor: pointer;
            transition: background 0.2s, border 0.2s;
            margin-bottom: 1.5em;
        }
        .upload-area:hover {
            background: #2a0845;
            border-color: #fff;
        }
        .upload-area.drag-over {
            background: #6441a5;
            border-color: #fff;
        }
        .upload-area input[type="file"] {
            display: none;
        }
        .upload-hint {
            color: #b388ff;
            font-size: 1.1em;
            margin-bottom: 1em;
        }
        .palette-search-box {
            background: #2a0845cc;
            border-radius: 8px;
            padding: 1em;
            margin-bottom: 1.5em;
        }
        .palette-search-input {
            width: 100%;
            max-width: 500px;
            background: #3d246c;
            color: #fff;
            border: 1px solid #7c4dff;
            border-radius: 8px;
            padding: 0.8em 1em;
            font-size: 1em;
            margin-bottom: 1em;
        }
        .palette-search-input:focus {
            outline: none;
            border-color: #b388ff;
            box-shadow: 0 2px 12px #b388ff44;
        }
        .palette-list {
            background: #2a0845cc;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1.5em;
        }
        .palette-item {
            padding: 0.8em 1em;
            border-bottom: 1px solid #6441a5;
            cursor: pointer;
            transition: background 0.2s;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .palette-item:hover {
            background: #6441a5;
        }
        .palette-item.selected {
            background: #7c4dff;
            color: #2a0845;
        }
        .palette-display {
            background: #6441a5;
            border-radius: 8px;
            padding: 1em;
            margin-bottom: 1.5em;
            color: #fff;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.95em;
        }
        .palette-buttons {
            display: flex;
            gap: 1em;
            margin-bottom: 2em;
            flex-wrap: wrap;
            justify-content: center;
        }
        .action-btn {
            background: #7c4dff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 8px #0003;
            transition: background 0.2s, transform 0.2s;
        }
        .action-btn:hover {
            background: #b388ff;
            color: #2a0845;
            transform: scale(1.04);
        }
        .action-btn:disabled {
            background: #6441a5;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2em;
            margin-top: 2em;
            text-align: center;
        }
        .preview-item {
            background: #2a0845cc;
            border-radius: 12px;
            padding: 1em;
            border: 1px solid #7c4dff;
        }
        .preview-item h4 {
            color: #b388ff;
            margin-top: 0;
            margin-bottom: 1em;
        }
        .preview-item img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 2px 12px #7c4dff44;
        }
        .no-image {
            color: #b388ff;
            padding: 2em;
            opacity: 0.7;
        }
        @media (max-width: 600px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
            .palette-search-input {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1 id="main-title" class="dynamic-title">Recherche Pokémon</h1>
    <div class="lang-switch">
        <button id="lang-fr" class="lang-btn">FR</button>
        <button id="lang-en" class="lang-btn">EN</button>
    </div>
    <div id="tabs-section" class="tabs-container" style="display:none;">
        <button id="tab-search" class="tab-btn active" onclick="switchTab('search')"><span id="search-btn-text">Recherche</span></button>
        <button id="tab-import" class="tab-btn" onclick="switchTab('import')"><span id="import-btn-text">Import Sprite</span></button>
    </div>
    <div class="search-box" id="search-section">
        <input type="text" id="search" placeholder="Numéro du Pokémon..." autocomplete="off" />
        <button id="valider-btn">Valider</button>
        <div id="suggestions" class="suggestions"></div>
    </div>
    <div id="import-section" class="import-section">
        <h2 id="import-sprite-title" style="color: #b388ff; text-align: center; margin-top: 0;">Import Sprite</h2>
        <div class="upload-area" id="upload-area">
            <div class="upload-hint" id="drag-drop-hint">Glissez-déposez une image PNG ici</div>
            <input type="file" id="file-input" accept=".png,image/png" />
            <button class="action-btn" id="upload-btn" style="margin-top: 1em;">Sélectionner une image</button>
        </div>
        <img id="uploaded-image" style="display:none; max-width: 0%; border-radius: 8px; margin-bottom: 2em;" />
        <div id="palette-section" style="display:none;">
            <h3 id="select-palettes-title" style="color: #b388ff; margin-top: 0;">Sélectionner les palettes</h3>
            
            <!-- APERÇUS Original vs Shiny EN HAUT -->
            <div class="preview-container" style="margin-bottom: 2em;">
                <div class="preview-item">
                    <h4 id="original-label">Original</h4>
                    <img id="original-preview" style="max-height: 250px;" />
                </div>
                <div class="preview-item">
                    <h4 id="preview-title">Aperçu avec palette(s)</h4>
                    <img id="palette-preview" style="max-height: 250px;" />
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2em; margin-bottom: 2em;">
                <!-- PALETTE TÊTE -->
                <div style="background: #2a0845cc; border-radius: 12px; padding: 1.5em; border: 1px solid #7c4dff;">
                    <h4 id="head-palette-title" style="color: #b388ff; margin-top: 0; text-align: center;">👤 Palette Tête</h4>
                    <input type="text" id="palette-search-head" class="palette-search-input" placeholder="Rechercher..." style="width: 90%; margin-bottom: 1em;" />
                    <div id="palette-list-head" class="palette-list" style="max-height: 250px;"></div>
                    <div id="palette-display-head" class="palette-display" style="margin-top: 1em;">—</div>
                </div>
                
                <!-- PALETTE CORPS -->
                <div style="background: #2a0845cc; border-radius: 12px; padding: 1.5em; border: 1px solid #7c4dff;">
                    <h4 id="body-palette-title" style="color: #b388ff; margin-top: 0; text-align: center;">🦴 Palette Corps</h4>
                    <input type="text" id="palette-search-body" class="palette-search-input" placeholder="Rechercher..." style="width: 90%; margin-bottom: 1em;" />
                    <div id="palette-list-body" class="palette-list" style="max-height: 250px;"></div>
                    <div id="palette-display-body" class="palette-display" style="margin-top: 1em;">—</div>
                </div>
            </div>
            
            <div class="palette-buttons" style="justify-content: center;">
                <button class="action-btn" id="reset-palettes-btn" onclick="resetPaletteSelection()" style="padding: 12px 30px; font-size: 1.1em; background: #6441a5;">🔄 Réinitialiser</button>
            </div>
            
            <div style="text-align: center; margin-top: 2em;">
                <button class="action-btn" id="download-btn" onclick="downloadImage()" style="padding: 12px 30px; font-size: 1.1em;">⬇️ Télécharger l'image</button>
            </div>
        </div>
    </div>
    <div id="pokemon-detail" style="display:none; max-width:800px; margin:auto; background:#fff; padding:2em; border-radius:10px; box-shadow:0 2px 8px #0001;"></div>
    <footer class="footer-credits">
        <div id="footer-credit"></div>
    </footer>

function getLang() {
    const params = new URLSearchParams(window.location.search);
    return params.get('lang') || 'en';
}
function t(key) {
    const lang = getLang();
    return translations[lang][key] || key;
}

    let pokemons = [];
    let suggestionsDiv = document.getElementById('suggestions');
    let searchInput = document.getElementById('search');
    let detailDiv = document.getElementById('pokemon-detail');
    let searchSection = document.getElementById('search-section');
    let mainTitle = document.getElementById('main-title');

    fetch('https://docs.google.com/spreadsheets/d/1N-wZs3SaLRQ7zyKQKGIk_ctYr1YqNHn8ROkSUmHMRsM/gviz/tq?tqx=out:json')
        .then(r => r.text())
        .then(txt => {
            let json = JSON.parse(txt.substring(47).slice(0, -2));
            let cols = json.table.cols.map(c => c.label.toLowerCase());
            pokemons = json.table.rows.map(row => {
                let obj = {};
                row.c.forEach((cell, i) => {
                    obj[cols[i]] = cell ? cell.v : '';
                });

                let key = Object.keys(obj).find(k => k.includes('name of the pokémon'));
                if (key && obj[key]) {
                    let value = obj[key].trim(); 
                    let match = value.match(/^(.+?) \((\d+)\)$/);
                    if (match) {
                        obj.nom = match[1].trim();
                        obj.numero = match[2].trim();
                    } else {
                        obj.nom = value.trim();
                        obj.numero = '';
                    }
                }
                let paletteKey = Object.keys(obj).find(k => k.includes('palette'));
                if (paletteKey && obj[paletteKey]) {
                    obj.palette = obj[paletteKey];
                }
                obj.video_sprite = obj['video of all base pokémon sprites'] || '';
                obj.video_fusion = obj['video of all self-fusion pokémon sprites'] || '';
                obj.like = obj['like'] || obj['likes'] || 0;
                return obj;
            });
            afficherSiDetail();
        });

function updateLike(num, author, action, callback) {

        .then(r => r.text())
        .then(val => callback(val));

function detectMaxTileInFolder(numero, folder, callback, maxTry = 50) {
    let count = 0;
    function tryNext(i) {
        if (i > maxTry) return callback(count);
        let img = new Image();
        img.onload = () => { count = i; tryNext(i + 1); };
        img.onerror = () => callback(count);
        img.src = `${folder}/${numero}/tile${i}.png`;
    }
    tryNext(1);
}

function detectMaxTile(numero, callback, maxTry = 50) {
        let count = 0;
        function tryNext(i) {
            if (i > maxTry) return callback(count);
            let img = new Image();
            img.onload = () => { count = i; tryNext(i + 1); };
            img.onerror = () => callback(count);
            img.src = `POKEMON_BASE/${numero}/tile${i}.png`;
        }
        tryNext(1);
    }

    function parsePaletteLine(palette) {
        if (!palette) return [];
        let match = palette.match(/\{(.+)\}/);
        if (!match) return [];
        let content = match[1];
        let pairs = [];
        content.split(',').forEach(part => {
            let m = part.match(/"([^"]+)"/);
            if (m) {
                let [from, to] = m[1].split('.');
                if (from && to) {
                    let fromArr = from.trim().startsWith('#')
                        ? hexToRgb(from.trim())
                        : from.trim().split(' ').map(Number);
                    let toArr = to.trim().startsWith('#')
                        ? hexToRgb(to.trim())
                        : to.trim().split(' ').map(Number);
                    
                    // Appliquer la logique Ruby : si valeur <= 10, remplacer par 10
                    for (let i = 0; i < fromArr.length; i++) {
                        if (fromArr[i] <= 10) fromArr[i] = 10;
                    }
                    for (let i = 0; i < toArr.length; i++) {
                        if (toArr[i] <= 10) toArr[i] = 10;
                    }
                    
                    pairs.push({
                        from: fromArr,
                        to: toArr
                    });
                }
            }
        });
        return pairs;
    }
    function hexToRgb(hex) {
        hex = hex.replace(/^#/, '');
        if (hex.length === 3) hex = hex.split('').map(x=>x+x).join('');
        let num = parseInt(hex, 16);
        return [num >> 16, (num >> 8) & 255, num & 255];
    }
    function rgbToHex(rgb) {
        return '#' + rgb.map(x => x.toString(16).padStart(2, '0')).join('');
    }
    function applyPaletteToImage(img, palettePairs, doubleShiny, callback) {
        let canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let data = imageData.data;

        // Sépare les paires identiques et différentes pour le double shiny
        const identical = [];
        const different = [];
        
        if (doubleShiny) {
            for (const p of palettePairs) {
                if (p.from[0] === p.to[0] && p.from[1] === p.to[1] && p.from[2] === p.to[2]) {
                    identical.push(p);
                } else {
                    different.push(p);
                }
            }
        }

        function applyRules(pairs) {
            // Cache pour éviter les recalculs DANS cette pass
            const colorCache = {};
            
            for (let i = 0; i < data.length; i += 4) {
                const alpha = data[i + 3];
                if (alpha === 0) continue;

                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                // Créer la clé du cache
                const key = `${r},${g},${b}`;

                // Vérifier le cache
                if (colorCache.hasOwnProperty(key)) {
                    const cached = colorCache[key];
                    if (cached) {
                        data[i] = cached[0];
                        data[i + 1] = cached[1];
                        data[i + 2] = cached[2];
                    }
                    continue;
                }

                // Convertir en float
                let rf = r * 1.0;
                let gf = g * 1.0;
                let bf = b * 1.0;

                // Éviter la division par zéro
                if (rf < 0.1) rf = 0.1;
                if (gf < 0.1) gf = 0.1;
                if (bf < 0.1) bf = 0.1;

                // Trouver la règle la plus proche
                let minDistance = Infinity;
                let closestRule = null;

                for (const rule of pairs) {
                    const from = rule.from;
                    const dist = Math.pow(rf - from[0], 2) + Math.pow(gf - from[1], 2) + Math.pow(bf - from[2], 2);
                    
                    if (dist < minDistance) {
                        minDistance = dist;
                        closestRule = rule;
                    }
                }

                if (!closestRule) {
                    colorCache[key] = null;
                    continue;
                }

                // Appliquer la formule : adjusted = to + (pixel - from), clampé à [0, 255]
                const from = closestRule.from;
                const to = closestRule.to;

                let adjustedR = to[0] + (rf - from[0]);
                let adjustedG = to[1] + (gf - from[1]);
                let adjustedB = to[2] + (bf - from[2]);

                // Clamp entre 0 et 255
                adjustedR = Math.max(0, Math.min(255, adjustedR));
                adjustedG = Math.max(0, Math.min(255, adjustedG));
                adjustedB = Math.max(0, Math.min(255, adjustedB));

                const adj = [Math.round(adjustedR), Math.round(adjustedG), Math.round(adjustedB)];
                colorCache[key] = adj;

                data[i] = adj[0];
                data[i + 1] = adj[1];
                data[i + 2] = adj[2];
            }
        }

        // Appliquer les règles
        if (doubleShiny) {
            if (different.length > 0) applyRules(different);
            if (identical.length > 0) applyRules(identical);
        } else {
            applyRules(palettePairs);
        }

        ctx.putImageData(imageData, 0, 0);
        callback(canvas.toDataURL());
    }

    function combinePalettes(headPaletteStr, bodyPaletteStr) {
        // Extraire les paires de chaque palette
        const headPairs = parsePaletteLine(headPaletteStr);
        const bodyPairs = parsePaletteLine(bodyPaletteStr);
        
        const differentPairs = [];
        const identicalPairs = [];
        
        // Ajouter les paires de la tête
        for (const pair of headPairs) {
            if (pair.from[0] === pair.to[0] && pair.from[1] === pair.to[1] && pair.from[2] === pair.to[2]) {
                identicalPairs.push(pair);
            } else {
                differentPairs.push(pair);
            }
        }
        
        // Ajouter les paires du corps
        for (const pair of bodyPairs) {
            if (pair.from[0] === pair.to[0] && pair.from[1] === pair.to[1] && pair.from[2] === pair.to[2]) {
                identicalPairs.push(pair);
            } else {
                differentPairs.push(pair);
            }
        }
        
        // Construire la chaîne combinée
        let result = '';
        
        if (differentPairs.length > 0) {
            result += differentPairs.map(p => `"${p.from.join(' ')}.${p.to.join(' ')}"`).join(',');
        }
        
        if (identicalPairs.length > 0) {
            const identicalStr = identicalPairs.map(p => `"${p.from.join(' ')}.${p.to.join(' ')}"`).join(',');
            if (result) {
                result += '&' + identicalStr;
            } else {
                result = identicalStr;
            }
        }
        
        return `{${result}}`;
    }

    function applyPaletteString(img, paletteStr, callback) {
        // Cette fonction gère le format avec & et |
        if (!paletteStr || paletteStr === 'nil' || paletteStr === '{"nil"}') {
            callback(img.src);
            return;
        }

        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        // Traiter chaque partie séparée par &
        const parts = paletteStr.replace(/[{}]/g, '').split('&').map(p => p.trim());
        
        let currentCanvas = canvas;
        
        for (let i = 0; i < parts.length; i++) {
            const part = parts[i];
            if (!part) continue;
            
            const pairs = part.split(',').map(pairStr => {
                const match = pairStr.match(/"([^"]+)"/);
                if (!match) return null;
                
                const [from, to] = match[1].split('.');
                return {
                    from: from.trim().split(' ').map(Number),
                    to: to.trim().split(' ').map(Number)
                };
            }).filter(p => p !== null);
            
            // Appliquer avec double shiny pour toutes les parties
            const imageData = ctx.getImageData(0, 0, currentCanvas.width, currentCanvas.height);
            applyRulesToImageData(imageData, pairs, true);
            ctx.putImageData(imageData, 0, 0);
        }
        
        callback(canvas.toDataURL());
    }

    function applyRulesToImageData(imageData, pairs, doubleShiny) {
        const data = imageData.data;
        
        // Sépare les paires identiques et différentes
        const identical = [];
        const different = [];
        
        if (doubleShiny) {
            for (const p of pairs) {
                if (p.from[0] === p.to[0] && p.from[1] === p.to[1] && p.from[2] === p.to[2]) {
                    identical.push(p);
                } else {
                    different.push(p);
                }
            }
        }
        
        function applyRules(rulePairs) {
            const colorCache = {};
            
            for (let i = 0; i < data.length; i += 4) {
                const alpha = data[i + 3];
                if (alpha === 0) continue;

                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                const key = `${r},${g},${b}`;

                if (colorCache.hasOwnProperty(key)) {
                    const cached = colorCache[key];
                    if (cached) {
                        data[i] = cached[0];
                        data[i + 1] = cached[1];
                        data[i + 2] = cached[2];
                    }
                    continue;
                }

                let rf = r * 1.0;
                let gf = g * 1.0;
                let bf = b * 1.0;

                if (rf < 0.1) rf = 0.1;
                if (gf < 0.1) gf = 0.1;
                if (bf < 0.1) bf = 0.1;

                let minDistance = Infinity;
                let closestRule = null;

                for (const rule of rulePairs) {
                    const from = rule.from;
                    const dist = Math.pow(rf - from[0], 2) + Math.pow(gf - from[1], 2) + Math.pow(bf - from[2], 2);
                    
                    if (dist < minDistance) {
                        minDistance = dist;
                        closestRule = rule;
                    }
                }

                if (!closestRule) {
                    colorCache[key] = null;
                    continue;
                }

                const from = closestRule.from;
                const to = closestRule.to;

                let adjustedR = to[0] + (rf - from[0]);
                let adjustedG = to[1] + (gf - from[1]);
                let adjustedB = to[2] + (bf - from[2]);

                adjustedR = Math.max(0, Math.min(255, adjustedR));
                adjustedG = Math.max(0, Math.min(255, adjustedG));
                adjustedB = Math.max(0, Math.min(255, adjustedB));

                const adj = [Math.round(adjustedR), Math.round(adjustedG), Math.round(adjustedB)];
                colorCache[key] = adj;

                data[i] = adj[0];
                data[i + 1] = adj[1];
                data[i + 2] = adj[2];
            }
        }

        if (doubleShiny) {
            if (different.length > 0) applyRules(different);
            if (identical.length > 0) applyRules(identical);
        } else {
            applyRules(pairs);
        }
    }

    function resetPaletteSelection() {
        selectedPaletteHead = null;
        selectedPaletteBody = null;
        paletteSearchHead.value = '';
        paletteSearchBody.value = '';
        paletteListHead.innerHTML = '';
        paletteListBody.innerHTML = '';
        paletteDisplayHead.textContent = '—';
        paletteDisplayBody.textContent = '—';
        palettePreview.src = '';
        palettePreview.style.display = 'none';
        document.getElementById('preview-title').textContent = t('previewWithPalette');
        updatePaletteListHead();
        updatePaletteListBody();
    }

    function downloadImage() {
        if (!palettePreview.src || palettePreview.src === '') {
            alert(t('applyFirstPalette'));
            return;
        }
        const link = document.createElement('a');
        link.href = palettePreview.src;
        link.download = `sprite_${Date.now()}.png`;
        link.click();
    }

    // Insérer la palette display dans le HTML
    setTimeout(() => {
        // Code d'initialisation si nécessaire
    }, 100);

    function resetImport() {
        importedImage = null;
        uploadedFile = null;
        selectedPaletteHead = null;
        selectedPaletteBody = null;
        filteredPalettesHead = [];
        filteredPalettesBody = [];
        uploadedImageElement.src = '';
        uploadedImageElement.style.display = 'none';
        uploadArea.style.display = 'block';
        paletteSection.style.display = 'none';
        fileInput.value = '';
        paletteSearchHead.value = '';
        paletteSearchBody.value = '';
        paletteListHead.innerHTML = '';
        paletteListBody.innerHTML = '';
        paletteDisplayHead.textContent = '—';
        paletteDisplayBody.textContent = '—';
        palettePreview.src = '';
        palettePreview.style.display = 'none';
        document.getElementById('preview-title').textContent = t('previewWithPalette');
    }
    </script>
